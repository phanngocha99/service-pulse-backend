# Comments are provided throughout this file to help you get started.
# If you need more help, visit the Docker Compose reference guide at
# https://docs.docker.com/go/compose-spec-reference/

# Here the instructions define your application as a service called "server".
# This service is built from the Dockerfile in the current directory.
# You can add other services your application may depend on here, such as a
# database or a cache. For examples, see the Awesome Compose repository:
# https://github.com/docker/awesome-compose
services:
  # ========================================
  # Development Service
  # ========================================
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: servicepulse-dev
    ports:
      - '${APP_PORT:-5200}:5200' # API server 
      - '${DEBUG_PORT:-9229}:9229' # Node.js debugger
      - '${PRISMA_PORT:-5555}:5555' # Prisma Studio
    environment:
      NODE_ENV: development
      DOCKER_ENV: 'true'
      DATABASE_URL: "postgresql://${POSTGRES_USER:-servicepulse_user}:${POSTGRES_PASSWORD:-servicepulse_password}@db:5432/${POSTGRES_DB:-servicepulse_db}?schema=public"
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: '${POSTGRES_DB:-servicepulse_db}'
      POSTGRES_USER: '${POSTGRES_USER:-servicepulse_user}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD:-servicepulse_password}'
      ALLOWED_ORIGINS: '${ALLOWED_ORIGINS:-http://localhost:5200}'
    volumes:
      - .:/app
      - /app/node_modules
    command: >
      sh -c "npx prisma generate && 
         npx prisma migrate dev && 
         npx prisma db push --accept-data-loss && 
         npx prisma db seed && 
         npm run start:dev"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - servicepulse-network
  # ========================================
  # Production Service
  # ========================================
  app-prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: servicepulse-prod
    ports:
      - '${PROD_PORT:-8080}:5200'
    environment:
      NODE_ENV: production
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DATABASE_URL: "postgresql://${POSTGRES_USER:-servicepulse_user}:${POSTGRES_PASSWORD:-servicepulse_password}@db:5432/${POSTGRES_DB:-servicepulse_db}?schema=public"
      POSTGRES_DB: '${POSTGRES_DB:-servicepulse_db}'
      POSTGRES_USER: '${POSTGRES_USER:-servicepulse_user}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD:-servicepulse_password}'
      ALLOWED_ORIGINS: '${ALLOWED_ORIGINS:-https://yourdomain.com}'
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: '${PROD_MEMORY_LIMIT:-2G}'
          cpus: '${PROD_CPU_LIMIT:-1.0}'
        reservations:
          memory: '${PROD_MEMORY_RESERVATION:-512M}'
          cpus: '${PROD_CPU_RESERVATION:-0.25}'
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    networks:
      - servicepulse-network
    profiles:
      - prod

  # ========================================
  # PostgreSQL Database Service
  # ========================================
  db:
    image: postgres:15
    container_name: servicepulse-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: '${POSTGRES_DB:-servicepulse_db}'
      POSTGRES_USER: '${POSTGRES_USER:-servicepulse_user}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD:-servicepulse_password}'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '${DB_PORT:-5432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-servicepulse_user} -d ${POSTGRES_DB:-servicepulse_db}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - servicepulse-network

# ========================================
# Volume Configuration
# ========================================
volumes:
    postgres_data:
      name: servicepulse-postgres-data
      driver: local

# ========================================
# Network Configuration
# ========================================
networks:
    servicepulse-network:
      name: servicepulse-network
      driver: bridge
  

